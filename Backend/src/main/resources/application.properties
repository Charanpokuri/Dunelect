spring.application.name=Dunelect

server.port=8081

spring.datasource.url=jdbc:mysql://localhost:3306/dunelect
spring.datasource.username=root
spring.datasource.password=1234
spring.jpa.hibernate.ddl-auto=update
spring.jpa.show_sql=true
spring.jpa.format_sql=true

spring.jpa.properties.hibernate.jdbc.time_zone=UTC
spring.jpa.properties.hibernate.dialect.storage_engine=innodb

dunelect.seed-mock-data=true

dunelect.jwt.secret=${DUNELECT_JWT_SECRET:dunelect-local-jwt-secret-change-in-production-min-32-chars}
dunelect.jwt.expiration-ms=${DUNELECT_JWT_EXPIRATION_MS:86400000}

dunelect.seed-app-users=false

dunelect.security.admin-username=${DUNELECT_ADMIN_USER:admin}
dunelect.security.admin-password=${DUNELECT_ADMIN_PASSWORD:12345678}
dunelect.security.operator-username=${DUNELECT_OPERATOR_USER:operator}
dunelect.security.operator-password=${DUNELECT_OPERATOR_PASSWORD:12345678}